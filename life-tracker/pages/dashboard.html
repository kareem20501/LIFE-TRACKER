<style>
/* ══════════════════════════════════════════════════════════
   DASHBOARD — page-scoped styles
══════════════════════════════════════════════════════════ */

/* ── Hero / overall level ── */
.dash-hero {
  padding: 26px 0 18px;
  text-align: center;
  background: radial-gradient(ellipse 60% 50% at 50% 130%, rgba(138,131,218,0.14), transparent 60%);
  margin: -22px -18px 0;
}
.dash-tag {
  font-size: 10px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--t3); margin-bottom: 8px;
}
.dash-title {
  font-family: 'Sora', sans-serif;
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 800;
  line-height: 1.35;
  letter-spacing: 1px;
  color: var(--t1);
}
.dash-title em {
  font-style: normal;
  background: var(--grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Overall rank block (flip card) ── */
.rank-flip-wrap {
  perspective: 1400px;
  margin: 18px 0 4px;
  cursor: pointer;
}
.rank-flip-inner {
  position: relative;
  transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(0.4,0,0.2,1);
}
.rank-flip-wrap.flipped .rank-flip-inner { transform: rotateY(180deg); }

.rank-face {
  background: var(--glass);
  border: 1px solid var(--b1);
  border-radius: var(--r-xl);
  padding: 16px;
  transition: border-color .15s;
}
.rank-flip-wrap:hover .rank-face { border-color: var(--b2); }

.rank-face-front {
  position: relative;
  backface-visibility: hidden;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.rank-face-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  transform: rotateY(180deg);
  display: flex; flex-direction: column; gap: 8px;
  overflow: hidden;
}

.rank-badge-wrap {
  width: 56px; height: 56px;
  border-radius: var(--r-md);
  border: 1px solid var(--b2);
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.rank-info { flex: 1; min-width: 110px; }
.rank-level-num {
  font-family: var(--f-display);
  font-size: 26px; font-weight: 800; line-height: 1.3;
  color: var(--t1);
}
.rank-name {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 3px;
}
.rank-xp { font-size: 11px; color: var(--t3); margin-top: 2px; }

.rank-bar-wrap { flex: 2; min-width: 160px; max-width: 320px; }
.rank-bar-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 600; color: var(--t3);
  margin-bottom: 5px;
}
.rank-track { height: 7px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
.rank-fill  {
  height: 100%; border-radius: 100px;
  background: var(--grad-bar);
  transition: width 1.1s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 0 10px rgba(138,131,218,0.4);
}
.rank-remain { font-size: 10px; color: var(--t3); margin-top: 5px; text-align: right; }
.rank-remain strong { color: var(--peach); }

.rank-flip-hint {
  position: absolute; bottom: 8px; right: 14px;
  display: flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--t4);
}

/* ── Rank road (back face) ── */
.rank-road-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--t3);
}
.rank-road-scroll {
  overflow-x: auto; flex: 1;
  display: flex; align-items: center;
  -ms-overflow-style: none; scrollbar-width: none;
}
.rank-road-scroll::-webkit-scrollbar { display: none; }

/* ── Language tabs (dashboard) ── */
.dash-lang-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin: 22px 0 4px;
}

/* ── Language summary line ── */
.lang-summary {
  font-size: 12px; color: var(--t3); margin-bottom: 10px;
}
.lang-summary strong { color: var(--t1); }

/* ── Skill grid ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-bottom: 6px;
}

.dash-sk-card {
  background: var(--glass); border: 1px solid var(--b1);
  border-radius: var(--r-md); padding: 13px 12px;
  cursor: pointer;
  transition: border-color .18s, transform .15s, box-shadow .2s;
}
.dash-sk-card:hover {
  border-color: var(--b2); transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.3), var(--glow);
}

.dash-sk-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 4px; margin-bottom: 8px;
}
.dash-sk-name {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--t3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}

.dash-sk-total {
  font-family: 'DM Sans', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--t1); line-height: 1; margin-bottom: 2px;
}
.dash-sk-unit { font-size: 10px; color: var(--t3); min-height: 13px; }

.dash-sk-rank {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin: 6px 0 4px;
  display: flex; justify-content: space-between;
}
.sk-bar-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; }
.sk-bar-fill  { height: 100%; border-radius: 100px; transition: width .9s cubic-bezier(.4,0,.2,1); }
.dash-sk-bottom { font-size: 9px; color: var(--t3); margin-top: 5px; }
.dash-sk-bottom strong { color: var(--peach); }

/* ── Touch typing card (streak only) ── */
.dash-sk-card.is-streak .dash-sk-total { font-size: 26px; }
.dash-streak-badge {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 5px;
  margin-top: 4px;
}
.dash-streak-badge.active { background: rgba(138,131,218,0.20); color: var(--indigo); border: 1px solid var(--b2); }
.dash-streak-badge.inactive { background: rgba(255,255,255,0.04); color: var(--t3); border: 1px solid var(--b1); }

/* ── Responsive ── */
@media (max-width: 640px) {
  .dash-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .rank-bar-wrap { width: 100%; max-width: none; }
}
@media (max-width: 380px) {
  .dash-grid { grid-template-columns: 1fr; }
}
</style>

<div class="page-inner">

  <!-- Hero -->
  <div class="dash-hero">
    <div class="dash-tag">Language Conqueror System</div>
    <h1 class="dash-title">YOUR <em>PROGRESS</em></h1>
  </div>

  <!-- Overall rank block (flip card) -->
  <div class="rank-flip-wrap" id="rank-flip-wrap" onclick="toggleRankRoad()">
    <div class="rank-flip-inner" id="rank-flip-inner">

      <!-- Front face: rank summary -->
      <div class="rank-face rank-face-front">
        <div class="rank-badge-wrap" id="rank-badge-wrap"></div>
        <div class="rank-info">
          <div class="rank-level-num" id="rank-level-num">1</div>
          <div class="rank-name" id="rank-name">Bronze V</div>
          <div class="rank-xp" id="rank-xp">0 XP Total</div>
        </div>
        <div class="rank-bar-wrap">
          <div class="rank-bar-labels">
            <span id="rb-from">Bronze V</span>
            <span id="rb-to">Bronze IV</span>
          </div>
          <div class="rank-track"><div class="rank-fill" id="rank-fill" style="width:0%"></div></div>
          <div class="rank-remain" id="rank-remain"><strong>—</strong> XP to next</div>
        </div>
        <div class="rank-flip-hint" id="rank-flip-hint-front"></div>
      </div>

      <!-- Back face: rank road -->
      <div class="rank-face rank-face-back">
        <div class="rank-road-title">Rank Road</div>
        <div class="rank-road-scroll" id="rank-road-wrap"></div>
        <div class="rank-flip-hint" id="rank-flip-hint-back"></div>
      </div>

    </div>
  </div>

  <!-- Language tabs -->
  <div class="dash-lang-tabs" id="dash-lang-tabs"></div>

  <!-- Per-language summary + skill grid -->
  <div id="dash-lang-content"></div>

</div>

<script>
/* ══════════════════════════════════════════════════════════
   DASHBOARD JS
══════════════════════════════════════════════════════════ */

let _rankRoadOpen   = false;

function renderDashboard() {
  _renderOverall();
  _buildDashLangTabs();
  _renderLangContent();
}

/* ── Overall rank block ──────────────────────────────────── */
function _renderOverall() {
  const totalXP = STATE.overallXP || 0;
  const info    = getLevelInfo(totalXP, XP_OVERALL);
  const { level, rank, pct, xpToNext, nextRank } = info;
  const parts = rank.label.split(' ');
  const tier  = parts[0];
  const sub   = parts.slice(1).join(' ') || '';

  document.getElementById('rank-badge-wrap').innerHTML = rankBadgeSVG(tier, sub, 46);
  document.getElementById('rank-level-num').textContent = level;
  document.getElementById('rank-name').textContent = rank.label;
  document.getElementById('rank-name').style.color = rank.col;
  document.getElementById('rank-xp').textContent = `${fmtNum(Math.round(totalXP))} XP Total`;
  document.getElementById('rb-from').textContent = rank.label;
  document.getElementById('rb-to').textContent   = nextRank ? nextRank.label : 'MAX';

  setTimeout(() => {
    document.getElementById('rank-fill').style.width = pct + '%';
  }, 60);

  document.getElementById('rank-remain').innerHTML = nextRank
    ? `<strong>${fmtNum(xpToNext)}</strong> XP to next`
    : `<strong style="color:${rank.col}">⚔️ Conqueror</strong>`;

  document.getElementById('rank-road-wrap').innerHTML = buildRankRoad(level);

  // أيقونات تلميح الـ flip (أيقونة فقط، تُحدَّث مرة واحدة تكفي لكن آمنة التكرار)
  const hf = document.getElementById('rank-flip-hint-front');
  const hb = document.getElementById('rank-flip-hint-back');
  if (hf) hf.innerHTML = icon('chevron-right', 11) + ' Rank Road';
  if (hb) hb.innerHTML = icon('chevron-left', 11) + ' Back';
}

function toggleRankRoad() {
  _rankRoadOpen = !_rankRoadOpen;
  document.getElementById('rank-flip-wrap').classList.toggle('flipped', _rankRoadOpen);
}

/* ── Language tabs ───────────────────────────────────────── */
function _buildDashLangTabs() {
  const langs = STATE.languages;
  const wrap  = document.getElementById('dash-lang-tabs');
  if (!wrap) return;

  const activeLang = STATE.getActiveLang('dashboard');

  if (langs.length <= 1) { wrap.innerHTML = ''; return; }

  wrap.innerHTML = langs.map(l => `
    <button class="lang-tab ${l.id === activeLang ? 'active' : ''}"
      onclick="_switchDashLang('${l.id}')">
      <span class="lang-tab-flag">${l.flag}</span>
      <span class="lang-tab-name">${l.name}</span>
    </button>`).join('');
}

function _switchDashLang(langId) {
  STATE.setActiveLang('dashboard', langId);
  _buildDashLangTabs();
  _renderLangContent();
}

/* ── Per-language content ────────────────────────────────── */
function _renderLangContent() {
  const wrap  = document.getElementById('dash-lang-content');
  const langs = STATE.languages;

  if (langs.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">🏆</span>
        <div class="empty-title">Your journey begins here</div>
        <div class="empty-body">Add a language in <strong>Settings</strong> to start earning XP.</div>
      </div>`;
    return;
  }

  const lang = langs.find(l => l.id === STATE.getActiveLang('dashboard')) || langs[0];
  const skills = STATE.skillsForLang(lang.id)
    .slice()
    .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

  const langXP   = STATE.xpForLang(lang.id);
  const langInfo = getLevelInfo(langXP, XP_LANG);

  let html = `
    <div class="lang-summary">
      ${lang.flag} <strong>${lang.name}</strong> — Level <strong>${langInfo.level}</strong>
      · <span style="color:${langInfo.rank.col};font-weight:700">${langInfo.rank.label}</span>
      · ${fmtNum(Math.round(langXP))} XP
    </div>
    <div class="dash-grid">`;

  skills.forEach(s => {
    // ── Touch typing card — streak only, no XP/levels ──
    if (s.is_checkbox || s.key === 'touch_typing') {
      const streak = STATE.streakMap[s.id]?.current || 0;
      const doneToday = (STATE.todayMap[s.id] || 0) >= 1;
      html += `
        <div class="dash-sk-card is-streak" onclick="navigate('skill-detail','${s.id}')">
          <div class="dash-sk-top">
            <span class="dash-sk-name">${skillIconHTML(s, 14)} ${s.name}</span>
          </div>
          <div class="dash-sk-total">${streak}</div>
          <div class="dash-sk-unit">day streak</div>
          <span class="dash-streak-badge ${doneToday ? 'active' : 'inactive'}">
            ${doneToday ? 'Done today' : 'Not yet'}
          </span>
        </div>`;
      return;
    }

    // ── Regular skill ──
    const xp     = STATE.xpMap[s.id] || 0;
    const si     = getLevelInfo(xp, XP_SKILL);
    const streak = STATE.streakMap[s.id]?.current || 0;
    const totalUnits = Math.round(xp / (s.xp_per_unit || s.xpU || 1));
    const sp     = si.rank.label.split(' ');

    const isMin  = s.unit === 'min';
    const totalDisplay = isMin ? fmtNum(totalUnits) : fmtNum(totalUnits);
    const unitLine = isMin
      ? `${s.unit} total${totalUnits > 0 ? ` · ${fmtMin(totalUnits)}` : ''}${streak ? ` · 🔥${streak}d` : ''}`
      : `${s.unit} total${streak ? ` · 🔥${streak}d` : ''}`;

    html += `
      <div class="dash-sk-card" onclick="navigate('skill-detail','${s.id}')">
        <div class="dash-sk-top">
          <span class="dash-sk-name">${skillIconHTML(s, 14)} ${s.name}</span>
          ${rankBadgeSVG(sp[0], sp.slice(1).join(' ') || '', 20)}
        </div>
        <div class="dash-sk-total">${totalDisplay}</div>
        <div class="dash-sk-unit">${unitLine}</div>
        <div class="dash-sk-rank">
          <span style="color:${si.rank.col}">${si.rank.label}</span>
          <span style="color:var(--t3)">${si.pct}%</span>
        </div>
        <div class="sk-bar-track">
          <div class="sk-bar-fill" style="width:${si.pct}%;background:linear-gradient(90deg,${si.rank.col}66,${si.rank.col})"></div>
        </div>
        <div class="dash-sk-bottom">
          ${si.nextRank
            ? `<strong>${fmtNum(si.xpToNext)}</strong> XP → ${si.nextRank.label}`
            : `<span style="color:${si.rank.col}">✨ Max Rank</span>`}
        </div>
      </div>`;
  });

  html += `</div>`;
  wrap.innerHTML = html;
}
</script>
