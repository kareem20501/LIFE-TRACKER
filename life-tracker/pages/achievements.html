<div class="page-inner">

  <!-- Hero + timer -->
  <div class="league-hero">
    <h1 class="league-title">WEEKLY <em>LEAGUE</em></h1>
    <div class="timer-wrap">
      <div class="timer-block"><div class="timer-num" id="t-d">00</div><div class="timer-lbl">Days</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-block"><div class="timer-num" id="t-h">00</div><div class="timer-lbl">Hrs</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-block"><div class="timer-num" id="t-m">00</div><div class="timer-lbl">Min</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-block"><div class="timer-num" id="t-s">00</div><div class="timer-lbl">Sec</div></div>
    </div>
  </div>

  <!-- Podium Top 3 -->
  <div class="podium-wrap" id="podium-wrap" style="display:none"></div>

  <!-- Standings -->
  <div class="sec-label" id="standings-label"></div>
  <div class="standings-list" id="standings-list"></div>

  <!-- Skill leaders -->

  <div class="skill-leaders-list" id="skill-leaders-list"></div>

  <div class="history-list" id="history-list"></div>

</div>

<script>
/* ══════════════════════════════════════════════════════════
   LEAGUE JS
══════════════════════════════════════════════════════════ */

let _leagueTimerIv  = null;
let _leagueData     = null;

function renderLeague() {
  const sl = document.getElementById('standings-label');
  const kl = document.getElementById('skill-leaders-label');
  const hl = document.getElementById('history-label');
  if (sl) sl.innerHTML = `${icon('swords', 12)} Weekly Standings`;
  if (kl) kl.innerHTML = `${icon('award', 12)} Skill Leaders This Week`;
  if (hl) hl.innerHTML = `${icon('crown', 12)} Past Week Champions`;

  _startLeagueTimer();
  _fetchLeague();
}

/* ── Countdown timer to end of week (Sunday 23:59:59) ──────── */
function _startLeagueTimer() {
  function tick() {
    const now = new Date();
    const end = weekEndDate();
    const diff = Math.max(0, end.getTime() - now.getTime());

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    const elD = document.getElementById('t-d');
    const elH = document.getElementById('t-h');
    const elM = document.getElementById('t-m');
    const elS = document.getElementById('t-s');
    if (elD) elD.textContent = pad(d);
    if (elH) elH.textContent = pad(h);
    if (elM) elM.textContent = pad(m);
    if (elS) elS.textContent = pad(s);
  }
  if (_leagueTimerIv) clearInterval(_leagueTimerIv);
  tick();
  _leagueTimerIv = setInterval(tick, 1000);
}

/* ── Fetch league data ────────────────────────────────────── */
async function _fetchLeague() {
  try {
    const { data } = await api.league.get();
    _leagueData = data;
    _renderStandings(data);
    _renderSkillLeaders(data);
    _renderHistory(data);
  } catch (err) {
    console.error('[league]', err);
    document.getElementById('standings-list').innerHTML =
      `<div class="hist-empty">Could not load league data.</div>`;
  }
}

/* ── Position medal icon (1st/2nd/3rd) ── */
function positionMedal(rank, size = 18) {
  const colors = { 1: '#e8c840', 2: '#c0c0d0', 3: '#cd7f32' };
  const col = colors[rank];
  if (!col) return '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="9" fill="${col}" opacity="0.18"/>
    <circle cx="12" cy="12" r="9" fill="none" stroke="${col}" stroke-width="1.6"/>
    <text x="12" y="16" text-anchor="middle" font-family="Sora,sans-serif" font-size="11" font-weight="800" fill="${col}">${rank}</text>
  </svg>`;
}

/* ── Podium Top 3 ────────────────────────────────────────── */
function _initials(name) {
  return String(name || '?').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

/* Renders an avatar image if avatar_url is present, else falls back to initials */
function _avatarInner(s) {
  return s.avatar_url
    ? `<img src="${s.avatar_url}" alt="${escAttr(s.name || '')}">`
    : _initials(s.name);
}

function _renderPodium(standings) {
  const wrap = document.getElementById('podium-wrap');
  if (!wrap) return;

  if (standings.length < 3) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }

  // ترتيب العرض البصري: التاني - الأول - التالت (الأول في النص وأطول منصة)
  const top3 = standings.slice(0, 3);
  const order = [top3[1], top3[0], top3[2]];

  wrap.style.display = 'flex';
  wrap.innerHTML = order.map(s => {
    const rank = top3.indexOf(s) + 1;
    const ringCls  = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : 'rank-3';
    const platCls  = rank === 1 ? 'p1'     : rank === 2 ? 'p2'     : 'p3';
    const numCls   = rank === 1 ? 'r1'     : rank === 2 ? 'r2'     : 'r3';
    return `
      <div class="podium-col">
        <div class="podium-avatar-ring ${ringCls}">
          ${rank === 1 ? `<span class="podium-crown">${icon('crown', 22)}</span>` : ''}
          <div class="podium-avatar">${_avatarInner(s)}</div>
          <span class="podium-rank-num ${numCls}">${rank}</span>
        </div>
        <div class="podium-name">${s.name}</div>
        <div class="podium-xp">${fmtNum(Math.round(s.xp))} XP</div>
        <div class="podium-plat ${platCls}">${rank}</div>
      </div>`;
  }).join('');
}

/* ── Standings ────────────────────────────────────────────── */
function _renderStandings(data) {
  const el = document.getElementById('standings-list');
  const standings = (data.standings || []).filter(s => s.xp > 0);

  if (standings.length === 0) {
    document.getElementById('podium-wrap').style.display = 'none';
    el.innerHTML = `<div class="hist-empty">No activity this week yet. Be the first!</div>`;
    return;
  }

  _renderPodium(standings);

  // لو الـ podium ظاهر (3 لاعبين فأكتر) نعرض في القايمة العادية بس الترتيب من الرابع فما فوق
  const hasPodium = standings.length >= 3;
  const listedAll = hasPodium ? standings.slice(3) : standings;

  if (listedAll.length === 0) {
    el.innerHTML = '';
    return;
  }

  const maxXP    = standings[0].xp || 1;
  const startRank = hasPodium ? 4 : 1;

  // Cap the expandable list at rank 10 total
  const capped     = listedAll.slice(0, Math.max(0, 10 - (startRank - 1)));
  const alwaysShow = 2; // rank 4 & 5 (or 1 & 2 if no podium) are shown by default
  const visible    = capped.slice(0, alwaysShow);
  const hidden     = capped.slice(alwaysShow);

  const rowHTML = (s, i) => {
    const pct = Math.min(Math.round(s.xp / maxXP * 100), 100);
    const rank = startRank + i;
    const rowClass = !hasPodium && rank === 1 ? 'gold' : !hasPodium && rank === 2 ? 'silver' : !hasPodium && rank === 3 ? 'bronze' : '';
    const posClass = !hasPodium && rank === 1 ? 'p1'   : !hasPodium && rank === 2 ? 'p2'     : !hasPodium && rank === 3 ? 'p3'     : '';
    const bar = !hasPodium && rank === 1 ? 'linear-gradient(90deg,#e8c840aa,#e8c840)'
              : !hasPodium && rank === 2 ? 'linear-gradient(90deg,#c0c0d088,#c0c0d0)'
              : !hasPodium && rank === 3 ? 'linear-gradient(90deg,#cd7f3288,#cd7f32)'
              : 'var(--grad-bar)';
    return `
      <div class="st-row ${rowClass}">
        <div class="st-pos ${posClass}">${rank}</div>
        <div class="st-medal">${!hasPodium ? positionMedal(rank <= 3 ? rank : 0, 18) : ''}</div>
        <div class="st-avatar">${_avatarInner(s)}</div>
        <div class="st-name">${s.name}</div>
        <div class="st-bar-wrap">
          <div class="st-bar-track"><div class="st-bar-fill" style="width:${pct}%;background:${bar}"></div></div>
        </div>
        <div class="st-xp">${fmtNum(Math.round(s.xp))} XP</div>
      </div>`;
  };

  let html = visible.map((s, i) => rowHTML(s, i)).join('');

  if (hidden.length > 0) {
    html += `<div id="st-hidden-rows" style="display:none">
      ${hidden.map((s, i) => rowHTML(s, alwaysShow + i)).join('')}
    </div>
    <button class="st-viewmore-btn" id="st-viewmore-btn" onclick="_toggleStandingsMore()">
      <span id="st-viewmore-lbl">View ${hidden.length} more</span>
      <span class="chev">${icon('chevron-right', 12)}</span>
    </button>`;
  }

  el.innerHTML = html;
}

function _toggleStandingsMore() {
  const hiddenWrap = document.getElementById('st-hidden-rows');
  const btn        = document.getElementById('st-viewmore-btn');
  const lbl        = document.getElementById('st-viewmore-lbl');
  if (!hiddenWrap || !btn) return;

  const isOpen = hiddenWrap.style.display !== 'none';
  if (isOpen) {
    hiddenWrap.style.display = 'none';
    btn.classList.remove('open');
    lbl.textContent = `View ${hiddenWrap.children.length} more`;
  } else {
    hiddenWrap.style.display = 'contents';
    btn.classList.add('open');
    lbl.textContent = 'Show less';
  }
}

/* ── Skill leaders (deduped to the 5 core XP skills across all languages) ── */
function _renderSkillLeaders(data) {
  const el = document.getElementById('skill-leaders-list');
  const leaders = data.skill_leaders || [];

  // Keep only XP-bearing fixed skills (exclude touch_typing checkbox)
  const xpSkillKeys = FIXED_SKILLS.filter(s => !s.isCheckbox).map(s => s.key);

  // Group by skill_key, pick the entry with the highest leader value across languages
  const bestByKey = {};
  leaders.forEach(l => {
    if (!xpSkillKeys.includes(l.skill_key)) return;
    const val = l.leader?.value || 0;
    if (!bestByKey[l.skill_key] || val > (bestByKey[l.skill_key].leader?.value || 0)) {
      bestByKey[l.skill_key] = l;
    }
  });

  // Order by FIXED_SKILLS order
  const ordered = xpSkillKeys.map(k => bestByKey[k]).filter(Boolean);

  if (ordered.length === 0) {
    el.innerHTML = `<div class="hist-empty">No skill data yet.</div>`;
    return;
  }

  el.innerHTML = ordered.map(l => {
    const skillDef = FIXED_SKILLS.find(s => s.key === l.skill_key);
    const iconName = skillDef?.iconName || 'star';
    const dispVal = l.leader
      ? (l.unit === 'min' ? fmtMin(l.leader.value) : `${fmtNum(l.leader.value)} ${l.unit}`)
      : '';
    return `
      <div class="lcard">
        <div class="lcard-left">
          <span class="lcard-icon">${icon(iconName, 17)}</span>
          <div>
            <div class="lcard-skill">${l.skill_name}</div>
          </div>
        </div>
        <div class="lcard-sep"></div>
        <div class="lcard-right">
          ${l.leader
            ? `<span class="lcard-name">${l.leader.name} <span style="color:var(--t4);font-weight:600">(${flagIconHTML(langIsoByName(l.lang_name), 14)} ${l.lang_name})</span></span><span class="lcard-amount">${dispVal} ${icon('award', 14)}</span>`
            : `<span class="lcard-none">No data yet</span>`}
        </div>
      </div>`;
  }).join('');
}

/* ── Past week champions ─────────────────────────────────────── */
function _renderHistory(data) {
  const el = document.getElementById('history-list');
  const history = data.history || [];

  if (history.length === 0) {
    el.innerHTML = `<div class="hist-empty">No completed weeks yet.</div>`;
    return;
  }

  el.innerHTML = history.map(h => `
    <div class="hist-row">
      <div class="hist-week">${h.label}</div>
      <div class="hist-trophy">${icon('crown', 18)}</div>
      <div class="hist-name">${h.champion}</div>
      <div class="hist-xp">${fmtNum(Math.round(h.xp))} XP</div>
    </div>`).join('');
}
</script>
