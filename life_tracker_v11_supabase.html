<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker | Path of Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<!-- ══════════════════════════════════════════════
     SUPABASE SDK  (always keep before your code)
══════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F2F3F4;--beige:#DED1C6;--mauve:#A77693;--mauve-hi:#c490ae;
  --navy:#174871;--navy-deep:#0F2D4D;--bg:#0a1e2e;
  --surface:rgba(23,72,113,0.40);--surface2:rgba(23,72,113,0.72);
  --border:rgba(167,118,147,0.20);--border2:rgba(167,118,147,0.48);
  --text:#FFFFFF;--text2:#F2F3F4;--text3:#DED1C6;
  --dim:rgba(222,209,198,0.55);--very-dim:rgba(222,209,198,0.30);
  --grad-mauve:linear-gradient(135deg,#A77693,#174871);
  --grad-bar:linear-gradient(90deg,#A77693,#c490ae,#F2F3F4);
  --grad-hero:linear-gradient(160deg,#0F2D4D 0%,#174871 55%,#A77693 100%);
  --f-body:'Inter',sans-serif;--f-brand:'Orbitron',sans-serif;--f-title:'Cinzel',serif;
  --radius-card:14px;--radius-sm:8px;--shadow-glow:0 0 18px rgba(167,118,147,0.18);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f-body);background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--f-body);border:none;outline:none;background:none}
input,select{font-family:var(--f-body);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(167,118,147,0.35);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;transition:opacity .32s,transform .32s;z-index:1}
.page.hidden{opacity:0;pointer-events:none;transform:translateX(18px)}
.page-content{animation:fadeIn .35s ease}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px}
.progress-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.hidden-scroll{-ms-overflow-style:none;scrollbar-width:none}
.hidden-scroll::-webkit-scrollbar{display:none}
.sec-label{font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--beige);margin-bottom:12px;margin-top:24px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(222,209,198,0.14)}
.info-btn{background:none;border:1px solid rgba(222,209,198,0.28);border-radius:50%;width:18px;height:18px;color:var(--beige);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;flex-shrink:0}
.info-btn:hover{background:rgba(222,209,198,0.1);border-color:var(--beige);color:#fff}

/* ── Nav ── */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:rgba(10,30,46,0.96);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--f-brand);font-size:16px;font-weight:900;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,#F2F3F4,#c490ae,#A77693);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(167,118,147,0.45))}
.nav-right{display:flex;gap:4px;align-items:center}
.nav-link{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:5px 11px;border-radius:7px;transition:all .2s}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(167,118,147,0.14)}

/* ── Sync indicator ── */
#sync-indicator{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px;border:1px solid transparent;transition:all .3s;white-space:nowrap}
#sync-indicator.syncing{color:#c490ae;border-color:rgba(196,144,174,0.3);background:rgba(196,144,174,0.08)}
#sync-indicator.ok{color:rgba(78,205,196,0.8);border-color:rgba(78,205,196,0.2);background:rgba(78,205,196,0.06)}
#sync-indicator.error{color:#ff7070;border-color:rgba(255,80,80,0.3);background:rgba(255,80,80,0.08)}

/* ── Loading overlay ── */
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading-overlay.done{opacity:0;pointer-events:none}
.loading-spinner{width:32px;height:32px;border:2px solid rgba(167,118,147,0.15);border-top-color:var(--mauve-hi);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-family:var(--f-brand);font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--mauve-hi)}
.loading-sub{font-size:10px;color:var(--dim);letter-spacing:1px}

/* ── Log ── */
.log-skill-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.log-skill-row:hover{border-color:var(--border2);box-shadow:var(--shadow-glow)}
.log-skill-row.met{border-color:rgba(167,118,147,0.42)}
.log-skill-name{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-skill-val{font-size:12px;font-weight:500;white-space:nowrap;color:var(--text3)}
.log-skill-val.met{color:var(--mauve-hi);font-weight:700}

/* ── Dashboard ── */
.dash-skill-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .2s}
.dash-skill-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow-glow)}
.rank-pts-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;margin:4px 0 2px}
.rank-pts-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ── Rank Road ── */
.rank-road{display:flex;gap:0;overflow-x:auto;padding:12px 14px;white-space:nowrap;align-items:center}
.rank-point{display:flex;flex-direction:column;align-items:center;min-width:52px;flex-shrink:0}
.rank-dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);margin:4px 0;border:2px solid var(--border)}
.rank-dot.current{background:var(--mauve-hi);border-color:#fff;box-shadow:0 0 11px var(--mauve-hi)}
.rank-dot.past{background:var(--mauve);border-color:rgba(196,144,174,0.6)}
.rank-name{font-size:7px;font-weight:700;color:var(--dim);text-align:center;line-height:1.2;max-width:50px;white-space:normal}
.rank-xp{font-size:6px;color:var(--very-dim);white-space:nowrap}
.rank-road-connector{flex:1;height:2px;background:var(--border);align-self:center;min-width:4px}

/* ── Skill Detail ── */
.sd-hero{padding:24px 22px;background:var(--grad-hero);border-bottom:1px solid var(--border)}
.sd-hero-inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sd-rank-big{flex-shrink:0;width:80px;height:80px;border-radius:16px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center}
.sd-right{flex:1;display:flex;flex-direction:column;gap:5px}
.sd-icon-name{display:flex;align-items:center;gap:9px}
.sd-skill-icon{display:flex;align-items:center;color:var(--mauve-hi)}
.sd-skill-name{font-family:var(--f-title);font-size:23px;font-weight:700;color:#fff}
.sd-rank-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.sd-body{max-width:660px;margin:0 auto;padding:20px 18px 90px}

/* ── Streak ── */
.streak-box{margin-bottom:16px;padding:15px 17px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.streak-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.streak-lbl{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3)}
.streak-count{display:flex;align-items:baseline;gap:4px}
.streak-num{font-family:var(--f-title);font-size:23px;font-weight:700;color:#fff}
.streak-unit{font-size:11px;font-weight:600;color:var(--dim)}
.streak-track{position:relative;height:10px;background:rgba(255,255,255,0.05);border-radius:100px;overflow:visible}
.streak-fill{height:10px;border-radius:100px;background:var(--grad-bar);transition:width 1.2s cubic-bezier(.16,1,.3,1);position:relative;min-width:4px;box-shadow:0 0 11px rgba(167,118,147,0.55)}
.streak-flame{position:absolute;right:-9px;top:-12px;font-size:19px;filter:drop-shadow(0 0 6px rgba(255,140,50,.65))}
.streak-miles{display:flex;justify-content:space-between;margin-top:7px;font-size:9px;font-weight:600;letter-spacing:1px;color:var(--very-dim)}

/* ── Skill level bar ── */
.sd-rank-bar-box{margin-bottom:16px;padding:15px 17px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.sd-rank-bar-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;font-weight:600}
.sd-rank-bar-track{height:9px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.sd-rank-bar-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ── Chart ── */
.chart-box{margin-bottom:16px;padding:15px 17px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-title{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3)}
.chart-tabs{display:flex;gap:3px}
.chart-tab{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);transition:all .2s}
.chart-tab.active{background:rgba(167,118,147,0.18);border-color:var(--border2);color:#fff}
.chart-tab:hover:not(.active){border-color:rgba(167,118,147,0.3);color:var(--text3)}
.chart-wrap{position:relative;height:200px;overflow-x:hidden;overflow-y:visible}
.chart-scroll{overflow-x:auto;height:100%;scrollbar-width:thin;scrollbar-color:rgba(167,118,147,0.28) transparent}
.chart-scroll::-webkit-scrollbar{height:3px}
.chart-scroll::-webkit-scrollbar-thumb{background:rgba(167,118,147,0.28);border-radius:3px}
.bar-group{display:inline-flex;gap:4px;align-items:flex-end;height:100%;padding:28px 8px 32px;min-width:max-content}
.bar-col-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:22px;height:100%;gap:0}
.bar-val{font-size:7px;font-weight:700;color:var(--text3);margin-bottom:3px;white-space:nowrap;text-align:center;line-height:1;flex-shrink:0}
.bar-col{width:13px;border-radius:3px 3px 0 0;min-height:2px;flex-shrink:0}
.bar-lbl-wrap{display:flex;flex-direction:column;align-items:center;margin-top:4px;gap:1px;flex-shrink:0}
.bar-lbl{font-size:7px;font-weight:600;color:var(--dim);white-space:nowrap}
.bar-lbl-yr{font-size:6px;font-weight:700;color:rgba(196,144,174,0.55);white-space:nowrap}
.goal-line{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(196,144,174,0.55);pointer-events:none;z-index:2}
.goal-lbl{position:absolute;right:6px;top:-13px;font-size:7px;font-weight:700;color:var(--mauve-hi);background:rgba(10,30,46,0.8);padding:1px 4px;border-radius:3px}
.chart-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:12px;color:var(--dim)}

/* ── Calendar ── */
.cal-box{padding:15px 17px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:var(--f-title);font-size:14px;font-weight:700;color:#fff}
.cal-nav-btns{display:flex;gap:4px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text3);font-size:14px;line-height:1;transition:all .2s}
.cal-nav-btn:hover{border-color:var(--border2);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{text-align:center;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--very-dim);padding-bottom:6px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;font-size:9px;font-weight:600;color:rgba(222,209,198,0.28);background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.03);transition:all .2s;gap:1px;padding:2px 1px}
.cal-cell.empty{background:none;border:none}
.cal-cell.cal-today{border-color:rgba(167,118,147,0.45);color:var(--beige)}
.cal-cell.cal-met{background:rgba(167,118,147,0.48);border-color:var(--mauve-hi);color:#fff;font-weight:800;box-shadow:0 0 8px rgba(167,118,147,0.35)}
.cal-cell.cal-partial{background:rgba(167,118,147,0.12);border-color:rgba(167,118,147,0.3);color:var(--mauve-hi)}
.cal-day-num{font-size:9px;font-weight:700;line-height:1}
.cal-day-val{font-size:6px;font-weight:600;line-height:1;opacity:.8}
.cal-legend{display:flex;gap:12px;margin-top:8px;justify-content:flex-end}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--very-dim)}
.cal-legend-dot{width:7px;height:7px;border-radius:2px}

/* ── Analytics ── */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-top:16px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px}
.analytics-card h4{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--beige);margin-bottom:11px}
.analytics-bar-item{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.analytics-bar-label{flex:1;font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.analytics-bar-value{font-size:11px;font-weight:600;color:var(--text);min-width:46px;text-align:right;flex-shrink:0}
.analytics-bar-track{flex:2;height:7px;background:rgba(255,255,255,0.05);border-radius:100px;overflow:hidden;min-width:60px}
.analytics-bar-fill{height:100%;border-radius:100px;transition:width .8s}
.cat-level-hero{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:18px 20px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-card);margin-bottom:16px}
.cat-level-big{font-family:var(--f-title);font-size:48px;font-weight:700;color:#fff;line-height:1;flex-shrink:0}
.cat-level-details{flex:1;min-width:180px}
.cat-level-rank{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.cat-level-xp{font-size:11px;color:var(--dim);margin-bottom:8px}
.cat-level-bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.cat-level-bar-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.line-chart-container{overflow-x:auto;max-width:100%}
.line-chart-svg{height:190px;display:block}
.tooltip-box{position:fixed;background:#0d2035;border:1px solid var(--border2);border-radius:7px;padding:5px 9px;font-size:10px;color:#fff;pointer-events:none;white-space:nowrap;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.donut-svg{width:190px;height:190px;margin:0 auto;display:block}

/* ── Control ── */
.control-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:#fff;font-size:13px}
.control-input:focus{border-color:var(--border2)}
.btn-danger{background:rgba(255,80,80,0.15);color:#ff7070;border:1px solid rgba(255,80,80,0.28);border-radius:6px;padding:5px 11px;font-size:11px;font-weight:600;transition:all .2s}
.btn-danger:hover{background:rgba(255,80,80,0.28)}
.btn-sm{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;transition:all .2s}
.btn-sm:hover{border-color:var(--border2);color:#fff}
.btn-primary{background:var(--mauve);color:#fff;border:1px solid var(--mauve-hi);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;transition:all .2s}
.btn-primary:hover{background:var(--mauve-hi)}
.popup-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);backdrop-filter:blur(5px)}
.popup-box{background:#0f2236;border:1px solid var(--border2);border-radius:var(--radius-card);padding:20px;width:90%;max-width:370px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeIn .2s ease-out}

@media(max-width:680px){
  .sd-hero-inner{flex-direction:column;text-align:center}
  .sd-rank-big{margin:0 auto}
  .sd-body{padding:16px 12px 90px}
  .analytics-grid{grid-template-columns:1fr}
  nav{padding:0 12px}
  .nav-logo{font-size:13px}
  .nav-link{padding:4px 8px;font-size:9px}
  .cat-level-big{font-size:36px}
}
</style>
</head>
<body>

<!-- ══ Loading Overlay ══ -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">LIFE TRACKER</div>
  <div class="loading-sub" id="loading-sub">Connecting to database…</div>
</div>

<!-- ══ PAGE 1 – LOG ══ -->
<div id="page-log" class="page">
  <nav>
    <div class="nav-logo">LIFE TRACKER</div>
    <div class="nav-right">
      <span id="sync-indicator" class="ok">✓ synced</span>
      <button class="nav-link active" onclick="navigate('log')">Log</button>
      <button class="nav-link" onclick="navigate('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="navigate('control')">⚙️</button>
    </div>
  </nav>
  <div style="max-width:600px;margin:0 auto;padding:20px" class="page-content">
    <div class="sec-label">Select Date</div>
    <div style="display:flex;gap:8px;margin-bottom:22px">
      <input type="date" id="log-date" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;color:#fff;font-size:14px" onchange="renderLog()">
      <button onclick="document.getElementById('log-date').value=getTodayStr();renderLog()" style="border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--dim);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase">Today</button>
    </div>
    <div id="log-sections"></div>
  </div>
</div>

<!-- ══ PAGE 2 – DASHBOARD ══ -->
<div id="page-dashboard" class="page hidden">
  <nav>
    <div class="nav-logo">LIFE TRACKER</div>
    <div class="nav-right">
      <span id="sync-indicator-2" class="ok" style="font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px;border:1px solid rgba(78,205,196,0.2);background:rgba(78,205,196,0.06);color:rgba(78,205,196,0.8)">✓ synced</span>
      <button class="nav-link" onclick="navigate('log')">Log</button>
      <button class="nav-link active" onclick="navigate('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="navigate('control')">⚙️</button>
    </div>
  </nav>
  <div style="padding:28px 20px 14px;text-align:center;background:radial-gradient(ellipse 60% 50% at 50% 115%,rgba(167,118,147,0.15),transparent)">

<!-- ══════════════════════════════════════════════
     ④ SUPABASE DATA LAYER
     هذا هو "الجسر" بين قاعدة البيانات والصفحة
══════════════════════════════════════════════ -->
<script>
/* ── Sync indicator ── */
function setSyncStatus(state, msg){
  ['sync-indicator','sync-indicator-2'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.className=state;
    el.textContent=msg;
  });
}

/* ── Pull everything from Supabase into memory ── */
async function fetchAllFromSupabase(){
  setSyncStatus('syncing','⟳ syncing…');
  try{
    /* Categories */
    const {data:cats, error:ce}=await _sb.from('categories').select('*').order('created_at');
    if(ce) throw ce;
    CATEGORIES={};
    (cats||[]).forEach(c=>{ CATEGORIES[c.id]={id:c.id,name:c.name,icon:c.icon,color:c.color}; });

    /* Skills — column xp_w in DB ↔ xpW in code */
    const {data:skills, error:se}=await _sb.from('skills').select('*').order('created_at');
    if(se) throw se;
    SKILLS=(skills||[]).map(s=>({key:s.key,cat:s.cat,name:s.name,goal:s.goal,unit:s.unit,xpW:s.xp_w}));

    /* Entries */
    const {data:entries, error:ee}=await _sb.from('entries').select('date,skill,value');
    if(ee) throw ee;
    ENTRIES=(entries||[]).map(e=>({date:e.date,skill:e.skill,value:Number(e.value)}));

    setSyncStatus('ok','✓ synced');
  } catch(err){
    console.error('Supabase fetch error:',err);
    setSyncStatus('error','⚠ offline');
    /* Fallback: load from localStorage if available */
    _loadFromLocalStorage();
  }
}

/* ── Fallback: localStorage cache ── */
function _loadFromLocalStorage(){
  try{ CATEGORIES=JSON.parse(localStorage.getItem('lt_categories')||'{}'); }catch(e){ CATEGORIES={}; }
  try{ SKILLS=JSON.parse(localStorage.getItem('lt_skills')||'[]'); }catch(e){ SKILLS=[]; }
  try{ ENTRIES=JSON.parse(localStorage.getItem('lt_entries')||'[]'); }catch(e){ ENTRIES=[]; }
}
function _saveToLocalStorage(){
  localStorage.setItem('lt_categories',JSON.stringify(CATEGORIES));
  localStorage.setItem('lt_skills',JSON.stringify(SKILLS));
  localStorage.setItem('lt_entries',JSON.stringify(ENTRIES));
}

/* ═══════════════════════════════════════════════
   CATEGORY OPERATIONS
═══════════════════════════════════════════════ */
async function dbAddCategory(cat){
  CATEGORIES[cat.id]=cat;
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing','⟳ saving…');
  const {error}=await _sb.from('categories').insert({id:cat.id,name:cat.name,icon:cat.icon,color:cat.color});
  setSyncStatus(error?'error':'ok', error?'⚠ error':'✓ synced');
  if(error) console.error(error);
}

async function dbDeleteCategory(catId){
  const keys=SKILLS.filter(s=>s.cat===catId).map(s=>s.key);
  SKILLS=SKILLS.filter(s=>s.cat!==catId);
  ENTRIES=ENTRIES.filter(e=>!keys.includes(e.skill));
  delete CATEGORIES[catId];
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing','⟳ saving…');
  /* DB: cascade delete via foreign key, so just delete category */
  await _sb.from('entries').delete().in('skill',keys.length?keys:['__none__']);
  await _sb.from('skills').delete().eq('cat',catId);
  const {error}=await _sb.from('categories').delete().eq('id',catId);
  setSyncStatus(error?'error':'ok', error?'⚠ error':'✓ synced');
}

/* ═══════════════════════════════════════════════
   SKILL OPERATIONS
═══════════════════════════════════════════════ */
async function dbAddSkill(skill){
  SKILLS.push(skill);
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing','⟳ saving…');
  const {error}=await _sb.from('skills').insert({key:skill.key,cat:skill.cat,name:skill.name,goal:skill.goal,unit:skill.unit,xp_w:skill.xpW});
  setSyncStatus(error?'error':'ok', error?'⚠ error':'✓ synced');
  if(error) console.error(error);
}

async function dbDeleteSkill(skillKey){
  SKILLS=SKILLS.filter(s=>s.key!==skillKey);
  ENTRIES=ENTRIES.filter(e=>e.skill!==skillKey);
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing','⟳ saving…');
  await _sb.from('entries').delete().eq('skill',skillKey);
  const {error}=await _sb.from('skills').delete().eq('key',skillKey);
  setSyncStatus(error?'error':'ok', error?'⚠ error':'✓ synced');
}

async function dbUpdateSkill(skillKey, field, value){
  const s=SKILLS.find(s=>s.key===skillKey);
  if(!s) return;
  s[field]=value;
  _saveToLocalStorage();
  if(!_sb) return;
  const dbField = field==='xpW' ? 'xp_w' : field;
  const {error}=await _sb.from('skills').update({[dbField]:value}).eq('key',skillKey);
  if(error) console.error(error);
}

/* ═══════════════════════════════════════════════
   ENTRY OPERATIONS
   One record per (date × skill) — upsert pattern
═══════════════════════════════════════════════ */
async function dbSetEntry(date, skillKey, value){
  /* Update in-memory cache */
  ENTRIES=ENTRIES.filter(e=>!(e.date===date&&e.skill===skillKey));
  if(value>0) ENTRIES.push({date,skill:skillKey,value:Number(value)});
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing','⟳ saving…');
  /* Delete old record, insert new one if value > 0 */
  await _sb.from('entries').delete().eq('date',date).eq('skill',skillKey);
  if(value>0){
    const {error}=await _sb.from('entries').insert({date,skill:skillKey,value:Number(value)});
    setSyncStatus(error?'error':'ok', error?'⚠ error':'✓ synced');
    if(error) console.error(error);
  } else {
    setSyncStatus('ok','✓ synced');
  }
}

/* ═══════════════════════════════════════════════
   READ HELPERS  (all read from in-memory ENTRIES)
═══════════════════════════════════════════════ */
function getEntries(){ return ENTRIES; }

function calcTotal(skillKey){
  return ENTRIES.filter(e=>e.skill===skillKey).reduce((s,e)=>s+e.value,0);
}
function buildDailyMap(skillKey){
  const map={};
  ENTRIES.filter(e=>e.skill===skillKey).forEach(e=>{ map[e.date]=(map[e.date]||0)+e.value; });
  return map;
}
function calcSkillXP(skillKey){
  const s=SKILLS.find(s=>s.key===skillKey);
  if(!s) return 0;
  return ENTRIES.filter(e=>e.skill===skillKey).reduce((sum,e)=>sum+e.value*(s.xpW||1),0);
}
function calcCategoryXP(catId){
  return SKILLS.filter(s=>s.cat===catId).reduce((sum,s)=>sum+calcSkillXP(s.key),0);
}
function calcTotalXP(){
  return Object.keys(CATEGORIES).reduce((sum,catId)=>sum+calcCategoryXP(catId),0);
}
function getLast30(){ return Array.from({length:30},(_,i)=>dateFromOffset(29-i)); }
</script>

<!-- ══════════════════════════════════════════════
     ⑤ CORE MATH (levels, ranks, streaks)
══════════════════════════════════════════════ -->
<script>
function pad(n){ return String(n).padStart(2,'0'); }
function getTodayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateFromOffset(offset){ const d=new Date(); d.setDate(d.getDate()-offset); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function xpToLevel(xp,xpPerLevel){ return Math.min(Math.floor(xp/xpPerLevel)+1,LEVEL_MAX); }
function getRankIdx(level){ return Math.min(Math.floor((level-1)/3),33); }

function getLevelInfo(xp,xpPerLevel){
  const level    = xpToLevel(xp,xpPerLevel);
  const rankIdx  = getRankIdx(level);
  const rank     = SKILL_LEVELS[rankIdx];
  const maxed    = level>=LEVEL_MAX;
  const xpInLvl  = maxed ? xpPerLevel : xp%xpPerLevel;
  const levelPct = maxed ? 100 : Math.round(xpInLvl/xpPerLevel*100);
  const xpToNext = maxed ? 0   : Math.round(xpPerLevel-xpInLvl);
  const rankStartLevel = rankIdx*3+1;
  const rankEndLevel   = rankIdx===33 ? LEVEL_MAX : (rankIdx+1)*3;
  const levelsInRank   = rankEndLevel-rankStartLevel+1;
  const levelInRank    = level-rankStartLevel;
  const rankPct        = maxed ? 100 : Math.min(Math.round((levelInRank*100+levelPct)/levelsInRank),100);
  const nextRank       = rankIdx<33 ? SKILL_LEVELS[rankIdx+1] : null;
  return {level,rank,levelPct,xpToNext,xpInLvl,rankPct,nextRank};
}

function calcStreak(skillKey){
  const skill=SKILLS.find(s=>s.key===skillKey);
  if(!skill) return 0;
  const daily=buildDailyMap(skillKey);
  const today=getTodayStr();
  const cur=new Date(today+'T12:00:00');
  if(!daily[today]||daily[today]<skill.goal) cur.setDate(cur.getDate()-1);
  let streak=0;
  for(let i=0;i<3650;i++){
    const ds=`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`;
    if(daily[ds]&&daily[ds]>=skill.goal){ streak++; cur.setDate(cur.getDate()-1); } else break;
  }
  return streak;
}

function buildRankRoad(currentLevel){
  const currentIdx=getRankIdx(currentLevel);
  let html='<div class="rank-road hidden-scroll">';
  SKILL_LEVELS.forEach((rank,idx)=>{
    const startLv=idx*3+1;
    const isPast=idx<currentIdx; const isCur=idx===currentIdx;
    const parts=rank.label.split(' ');
    html+=`<div class="rank-point">
      <span class="rank-name" style="color:${isCur?rank.col:'var(--very-dim)'};font-weight:${isCur?'800':'600'}">${parts[0]}</span>
      <span class="rank-name" style="color:${isCur?rank.col:'var(--very-dim)'};margin-top:1px">${parts.slice(1).join(' ')||''}</span>
      <div class="rank-dot ${isCur?'current':''} ${isPast?'past':''}"></div>
      <span class="rank-xp">Lv${startLv}</span>
    </div>`;
    if(idx<33) html+=`<div class="rank-road-connector" style="background:${idx<currentIdx?'var(--mauve)':'var(--border)'}"></div>`;
  });
  return html+'</div>';
}
</script>

    const catSkills=SKILLS.filter(s=>s.cat===cat.id);
    if(!catSkills.length) return;
    html+=`<div class="sec-label">${cat.icon} ${cat.name}</div>`;
    catSkills.forEach(skill=>{
      const done=todayEntries.filter(e=>e.skill===skill.key).reduce((a,b)=>a+b.value,0);
      const pct=Math.min(Math.round(done/skill.goal*100),100);
      const met=done>=skill.goal;
      html+=`<div class="log-skill-row ${met?'met':''}" onclick="openInputPopup('${date}','${skill.key}','${skill.name}','${skill.unit}','${skill.goal}',${done})">
        <span class="log-skill-name" style="color:rgba(222,209,198,0.55)">${skillSVG(skill.key,15)}<span style="color:${met?'#fff':'var(--text2)';transition:color .2s}">${skill.name}</span></span>
        <span class="log-skill-val ${met?'met':''}">${done}/${skill.goal} ${skill.unit}</span>
        <div class="progress-bar" style="width:76px;height:5px;flex-shrink:0"><div class="progress-fill" style="width:${pct}%;background:${met?'var(--grad-bar)':'rgba(167,118,147,0.38)'}"></div></div>
      </div>`;
    });
  });
  document.getElementById('log-sections').innerHTML=html;
}

let _popupData=null;
function openInputPopup(date,skillKey,skillName,unit,goal,done){
  _popupData={date,skill:skillKey};
  document.getElementById('input-popup-title').textContent=skillName;
  document.getElementById('input-popup-info').innerHTML=`🎯 Goal: <strong style="color:var(--beige)">${goal} ${unit}</strong> &nbsp;·&nbsp; ✅ Done: <strong style="color:#fff">${done} ${unit}</strong>`;
  const inp=document.getElementById('input-popup-value');
  inp.value=done>0?done:'';
  document.getElementById('input-popup').style.display='flex';
  setTimeout(()=>{ inp.focus(); inp.select(); },80);
}
function closeInputPopup(){ _popupData=null; document.getElementById('input-popup').style.display='none'; }

async function saveInputPopup(){
  if(!_popupData) return;
  const val=parseFloat(document.getElementById('input-popup-value').value);
  if(isNaN(val)||val<0) return;
  closeInputPopup();
  await dbSetEntry(_popupData.date, _popupData.skill, val);
  renderLog();
  if(currentPage==='dashboard') renderDashboard();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('input-popup').style.display==='flex'){
    if(e.key==='Enter') saveInputPopup();
    if(e.key==='Escape') closeInputPopup();
  }
});
</script>

  let catHTML='';

          <span>${rankBadgeSVG(t2,sb2,18)}</span>

        <div style="font-size:9px;color:var(--dim);margin-bottom:6px">${s.unit} total${streak?' 🔥'+streak+'d':''}</div>

function toggleOverallView(){ overallView=overallView==='badge'?'road':'badge'; renderDashboard(); }

<!-- ══════════════════════════════════════════════
     ⑨ SKILL DETAIL
══════════════════════════════════════════════ -->
<script>
function renderSkillDetail(){
  if(!detailKey) return;
  const skill=SKILLS.find(s=>s.key===detailKey);
  if(!skill) return;
  const total=calcTotal(detailKey); const sxp=calcSkillXP(detailKey);
  const info=getLevelInfo(sxp,XP_PER_SKILL_LEVEL);
  const {level,rank,levelPct,xpToNext,nextRank}=info;
  const parts=rank.label.split(' '); const lt=parts[0]; const ls=parts.slice(1).join(' ')||'';

  document.getElementById('sd-hero').innerHTML=`
    <div class="sd-hero-inner">
      <div class="sd-rank-big">${rankBadgeSVG(lt,ls,64)}</div>
      <div class="sd-right">
        <div class="sd-icon-name"><div class="sd-skill-icon">${skillSVG(detailKey,22)}</div><div class="sd-skill-name">${skill.name}</div></div>
        <div class="sd-rank-label" style="color:${rank.col}">${rank.label}</div>
        <div style="font-size:13px;color:var(--text3)">Level <strong style="color:#fff;font-size:22px;font-family:var(--f-title)">${level}</strong><span style="font-size:11px;color:var(--dim)"> / ${LEVEL_MAX}</span></div>
        <div style="font-size:13px;color:var(--text3)">Total: <strong style="color:#fff">${total} ${skill.unit}</strong> &nbsp;·&nbsp; <span style="color:var(--mauve-hi)">${Math.round(sxp).toLocaleString()} XP</span></div>
      </div>
    </div>`;

  const stk=calcStreak(detailKey);
  const maxS=stk>0?Math.ceil(stk/15)*15:15;
  const sPct=Math.min(stk/maxS*100,100);

  const levelBarHTML=`
    <div class="sd-rank-bar-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700;color:${rank.col}">${rank.label}</div>
        <div style="font-size:11px;color:var(--dim)">Level ${level} / ${LEVEL_MAX}</div>
      </div>
      <div class="sd-rank-bar-label">
        <span style="color:var(--dim);font-size:10px">${Math.round(sxp%XP_PER_SKILL_LEVEL).toLocaleString()} / ${XP_PER_SKILL_LEVEL} XP in this level</span>
        ${nextRank?`<span style="color:var(--dim);font-size:10px">Next: <span style="color:${nextRank.col};font-weight:700">${nextRank.label}</span></span>`:`<span style="color:#ffd700;font-size:10px">✨ MAX LEVEL</span>`}
      </div>
      <div class="sd-rank-bar-track"><div class="sd-rank-bar-fill" style="width:${levelPct}%;background:linear-gradient(90deg,${rank.col}55,${rank.col})"></div></div>
      ${nextRank?`<div style="font-size:10px;color:var(--dim);margin-top:6px"><strong style="color:var(--beige)">${xpToNext.toLocaleString()} XP</strong> to Level ${level+1}${level%3===0?` · Next rank: <span style="color:${nextRank.col};font-weight:700">${nextRank.label}</span>`:''}</div>`:''}
    </div>`;

  const tabs=['day','week','month','year'].map(r=>`<button class="chart-tab ${detailRange===r?'active':''}" onclick="setChartRange('${r}')">${r}</button>`).join('');

  document.getElementById('sd-body').innerHTML=`
    <div class="streak-box">
      <div class="streak-meta"><div class="streak-lbl">🔥 Streak</div><div class="streak-count"><span class="streak-num">${stk}</span><span class="streak-unit">days</span></div></div>
      <div class="streak-track"><div class="streak-fill" style="width:${sPct}%"><span class="streak-flame">🔥</span></div></div>
      <div class="streak-miles"><span>0</span><span>${Math.round(maxS/4)}d</span><span>${Math.round(maxS/2)}d</span><span>${Math.round(maxS*3/4)}d</span><span>${maxS}d</span></div>
    </div>
    ${levelBarHTML}
    <div class="chart-box">
      <div class="chart-header"><div class="chart-title">History</div><div class="chart-tabs">${tabs}</div></div>
      <div class="chart-wrap" id="chart-wrap"><div class="chart-scroll" id="chart-scroll"><div class="chart-empty">Loading…</div></div></div>
    </div>
    <div class="cal-box">
      <div class="cal-header"><div class="cal-title" id="cal-month-lbl">—</div><div class="cal-nav-btns"><button class="cal-nav-btn" onclick="shiftCal(-1)">‹</button><button class="cal-nav-btn" onclick="shiftCal(1)">›</button></div></div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(167,118,147,.45);border:1px solid var(--mauve-hi)"></div>Goal met</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(167,118,147,.12);border:1px solid rgba(167,118,147,.3)"></div>Partial</div>
      </div>
    </div>`;
  renderChart(); renderCalendar();
}

function setChartRange(range){ detailRange=range; renderSkillDetail(); }

function renderChart(){
  if(!detailKey) return;
  const skill=SKILLS.find(s=>s.key===detailKey); if(!skill) return;
  const entries=ENTRIES.filter(e=>e.skill===detailKey);
  const now=new Date(); let data=[];
  if(detailRange==='day'){
    const ty=now.getFullYear();
    for(let i=89;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; const v=entries.filter(e=>e.date===ds).reduce((s,e)=>s+e.value,0); data.push({label:`${d.getMonth()+1}/${d.getDate()}`,year:d.getFullYear()!==ty?String(d.getFullYear()):'',value:v}); }
  } else if(detailRange==='week'){
    for(let i=51;i>=0;i--){ const ws=new Date(now); ws.setDate(ws.getDate()-ws.getDay()-i*7); const we=new Date(ws); we.setDate(we.getDate()+6); const v=entries.reduce((sum,e)=>{ const ed=new Date(e.date+'T12:00:00'); return (ed>=ws&&ed<=we)?sum+e.value:sum; },0); const wn=Math.ceil((ws-new Date(ws.getFullYear(),0,1))/604800000)+1; data.push({label:`W${wn}`,year:String(ws.getFullYear()),value:v}); }
  } else if(detailRange==='month'){
    const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    for(let i=23;i>=0;i--){ const ms=new Date(now.getFullYear(),now.getMonth()-i,1); const me=new Date(now.getFullYear(),now.getMonth()-i+1,0); const v=entries.reduce((sum,e)=>{ const ed=new Date(e.date+'T12:00:00'); return (ed>=ms&&ed<=me)?sum+e.value:sum; },0); data.push({label:mn[ms.getMonth()],year:String(ms.getFullYear()),value:v}); }
  } else if(detailRange==='year'){
    const map={}; entries.forEach(e=>{ const y=e.date.split('-')[0]; if(y) map[y]=(map[y]||0)+e.value; });
    data=Object.keys(map).sort().map(y=>({label:y,year:'',value:map[y]}));
  }
  const scroll=document.getElementById('chart-scroll'); const wrap=document.getElementById('chart-wrap');
  if(!scroll||!wrap) return;
  wrap.querySelectorAll('.goal-line').forEach(el=>el.remove());
  if(!data.length||data.every(d=>d.value===0)){ scroll.innerHTML='<div class="chart-empty">No data yet</div>'; return; }
  const goal=skill.goal||0; const maxV=Math.max(...data.map(d=>d.value),goal||1,1);
  const INNER_H=140; const PAD_BOT=32;
  let barsHTML='<div class="bar-group">';
  data.forEach(d=>{ const h=d.value>0?Math.max(Math.round(d.value/maxV*INNER_H),3):0; const met=goal>0&&d.value>=goal; const bg=met?'linear-gradient(0deg,#A77693,#c490ae)':d.value>0?'linear-gradient(0deg,#174871,#2a6fb0)':'rgba(255,255,255,0.035)'; barsHTML+=`<div class="bar-col-wrap"><div class="bar-val">${d.value>0?d.value:''}</div><div class="bar-col" style="height:${h}px;background:${bg}"></div><div class="bar-lbl-wrap"><span class="bar-lbl">${d.label}</span>${d.year?`<span class="bar-lbl-yr">${d.year}</span>`:''}</div></div>`; });
  barsHTML+='</div>'; scroll.innerHTML=barsHTML;
  if(goal>0&&goal<=maxV){ const goalPx=Math.round(goal/maxV*INNER_H)+PAD_BOT; const gl=document.createElement('div'); gl.className='goal-line'; gl.style.bottom=goalPx+'px'; const glbl=document.createElement('div'); glbl.className='goal-lbl'; glbl.textContent='goal '+goal; gl.appendChild(glbl); wrap.appendChild(gl); }
  requestAnimationFrame(()=>{ scroll.scrollLeft=scroll.scrollWidth; });
}

function renderCalendar(){
  if(!detailKey) return;
  const skill=SKILLS.find(s=>s.key===detailKey); if(!skill) return;
  const daily=buildDailyMap(detailKey); const todS=getTodayStr();
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent=`${MN[detailCalM]} ${detailCalY}`;
  const firstDay=new Date(detailCalY,detailCalM,1).getDay();
  const firstOffset=(firstDay+1)%7; // Sat=0
  const daysN=new Date(detailCalY,detailCalM+1,0).getDate();
  let html='';
  ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'].forEach(d=>{ html+=`<div class="cal-head">${d}</div>`; });
  for(let i=0;i<firstOffset;i++) html+='<div class="cal-cell empty"></div>';
  for(let day=1;day<=daysN;day++){
    const ds=`${detailCalY}-${pad(detailCalM+1)}-${pad(day)}`; const v=daily[ds]||0; const isT=ds===todS;
    let cls='cal-cell'; if(isT) cls+=' cal-today'; if(skill.goal>0&&v>=skill.goal) cls+=' cal-met'; else if(v>0) cls+=' cal-partial';
    html+=`<div class="${cls}"><span class="cal-day-num">${day}</span>${v>0?`<span class="cal-day-val">${v}</span>`:''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function shiftCal(dir){ detailCalM+=dir; if(detailCalM>11){ detailCalM=0; detailCalY++; } if(detailCalM<0){ detailCalM=11; detailCalY--; } if(detailKey) renderCalendar(); }
</script>

<!-- ══════════════════════════════════════════════
     ⑩ ANALYTICS
══════════════════════════════════════════════ -->
<script>
function _showTip(ev,html){ const t=document.getElementById('trend-tooltip'); t.innerHTML=html; t.style.display='block'; t.style.left=(ev.clientX+12)+'px'; t.style.top=(ev.clientY-32)+'px'; }
function _hideTip(){ document.getElementById('trend-tooltip').style.display='none'; }

function renderAnalytics(catId){
  const cat=CATEGORIES[catId]; if(!cat) return;
  const skills=SKILLS.filter(s=>s.cat===catId);
  if(!skills.length){ document.getElementById('analytics-grid').innerHTML='<p style="color:var(--dim)">No skills in this category.</p>'; document.getElementById('analytics-cat-level').innerHTML=''; return; }
  const skillKeys=skills.map(s=>s.key);
  const catEntries=ENTRIES.filter(e=>skillKeys.includes(e.skill));
  const last30=getLast30();

  document.getElementById('analytics-hero').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:28px">${cat.icon}</span>
      <div><h2 style="font-family:var(--f-title);font-size:22px;color:#fff;line-height:1">${cat.name}</h2>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Category Analytics</div></div>
    </div>`;

  const catXP=calcCategoryXP(catId); const catInfo=getLevelInfo(catXP,XP_PER_CAT_LEVEL);
  const cP=catInfo.rank.label.split(' '); const cT=cP[0]; const cS=cP.slice(1).join(' ')||'';

  document.getElementById('analytics-cat-level').innerHTML=`
    <div class="cat-level-hero" style="border-color:${catInfo.rank.col}44">
      <div style="flex-shrink:0">${rankBadgeSVG(cT,cS,56)}</div>
      <div><div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Category Level</div>
      <div class="cat-level-big">${catInfo.level}</div></div>
      <div class="cat-level-details">
        <div class="cat-level-rank" style="color:${catInfo.rank.col}">${catInfo.rank.label}</div>
        <div class="cat-level-xp">${Math.round(catXP).toLocaleString()} XP &nbsp;·&nbsp; ${catInfo.xpToNext.toLocaleString()} XP to Lv${Math.min(catInfo.level+1,LEVEL_MAX)}</div>
        <div class="cat-level-bar-track"><div class="cat-level-bar-fill" style="width:${catInfo.levelPct}%;background:linear-gradient(90deg,${catInfo.rank.col}66,${catInfo.rank.col})"></div></div>
        <div style="font-size:9px;color:var(--very-dim);margin-top:6px">${catInfo.levelPct}% through this level</div>
      </div>
    </div>`;

  const skillXP={}; skills.forEach(s=>{ skillXP[s.key]=calcSkillXP(s.key); });
  const totalXPCat=Object.values(skillXP).reduce((a,b)=>a+b,0);

  let contribHTML='';
  skills.forEach(s=>{ const xp=skillXP[s.key]||0; const pct=totalXPCat>0?Math.round(xp/totalXPCat*100):0; const si=getLevelInfo(xp,XP_PER_SKILL_LEVEL); contribHTML+=`<div class="analytics-bar-item"><span class="analytics-bar-label">${s.name} <span style="color:${si.rank.col};font-size:9px;font-weight:700">Lv${si.level}</span></span><div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${pct}%;background:${cat.color}"></div></div><span class="analytics-bar-value">${pct}%</span></div>`; });

  let achieveHTML='';
  skills.forEach(s=>{ const daily={}; catEntries.filter(e=>e.skill===s.key).forEach(e=>{ daily[e.date]=(daily[e.date]||0)+e.value; }); const totalAch=last30.reduce((sum,ds)=>sum+(daily[ds]||0),0); const avg=totalAch/30; const pct=s.goal>0?Math.round(avg/s.goal*100):0; const disp=Math.min(pct,100); achieveHTML+=`<div class="analytics-bar-item"><span class="analytics-bar-label">${s.name}</span><div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${disp}%;background:#4ECDC4"></div></div><span class="analytics-bar-value" style="color:${pct>100?'#4ECDC4':'var(--text)'}">${pct}%${pct>100?' 🔥':''}</span></div>`; });

  /* Trend line */
  const dailyTotalXP={};
  catEntries.forEach(e=>{ const s=skills.find(s=>s.key===e.skill); if(s) dailyTotalXP[e.date]=(dailyTotalXP[e.date]||0)+e.value*(s.xpW||1); });
  const allDates=Object.keys(dailyTotalXP).sort(); const today=getTodayStr(); const rangeStart=allDates.length?allDates[0]:today;
  const dateRange=[]; const cur2=new Date(rangeStart+'T12:00:00'); const end=new Date(today+'T12:00:00');
  while(cur2<=end){ dateRange.push(`${cur2.getFullYear()}-${pad(cur2.getMonth()+1)}-${pad(cur2.getDate())}`); cur2.setDate(cur2.getDate()+1); }
  if(!dateRange.length) dateRange.push(today);
  const lineVals=dateRange.map(ds=>dailyTotalXP[ds]||0); const maxLV=Math.max(...lineVals,1);
  const svgW=Math.max(600,dateRange.length*8); const svgH=190; const padL=30,padR=10,padT=10,padB=30; const innerW=svgW-padL-padR; const innerH=svgH-padT-padB;
  let areaPoints=`${padL},${svgH-padB} `; let linePoints=''; const circles=[];
  dateRange.forEach((ds,i)=>{ const x=padL+i*innerW/Math.max(dateRange.length-1,1); const y=svgH-padB-(lineVals[i]/maxLV*innerH); linePoints+=`${x.toFixed(1)},${y.toFixed(1)} `; areaPoints+=`${x.toFixed(1)},${y.toFixed(1)} `; if(lineVals[i]>0) circles.push({x,y,ds,v:Math.round(lineVals[i])}); });
  const lastX=padL+(dateRange.length-1)*innerW/Math.max(dateRange.length-1,1); areaPoints+=`${lastX.toFixed(1)},${svgH-padB}`;
  let yearMarkers=''; let lastYr='';
  dateRange.forEach((ds,i)=>{ const yr=ds.split('-')[0]; if(yr!==lastYr){ const x=padL+i*innerW/Math.max(dateRange.length-1,1); yearMarkers+=`<text x="${x.toFixed(1)}" y="${svgH-2}" font-size="7" fill="rgba(196,144,174,0.55)" font-family="Inter,sans-serif" font-weight="700">${yr}</text>`; lastYr=yr; } });
  let lineSVG=`<svg class="line-chart-svg" viewBox="0 0 ${svgW} ${svgH}" style="min-width:${svgW}px;width:100%"><polygon points="${areaPoints}" fill="${cat.color}" opacity="0.1"/><polyline fill="none" stroke="${cat.color}" stroke-width="1.8" stroke-linejoin="round" points="${linePoints}"/>${yearMarkers}`;
  circles.forEach(c=>{ lineSVG+=`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="${cat.color}" opacity="0.9" style="cursor:pointer" onmouseover="_showTip(event,'<strong>${c.ds}</strong><br>${c.v} XP')" onmouseout="_hideTip()"/>`; });
  lineSVG+='</svg>';

  /* Donut */
  const dc=['#FF6B6B','#4ECDC4','#FFD93D','#6C5CE7','#ff9040','#80d8ff','#c490ae','#e8c840','#cd7f32','#b090ff'];
  const circ=2*Math.PI*76; let donutHTML=`<svg class="donut-svg" viewBox="0 0 190 190">`; let cum=0;
  skills.forEach((s,i)=>{ const xp=skillXP[s.key]||0; const pct=totalXPCat>0?xp/totalXPCat:0; if(pct<0.005) return; const da=pct*circ; const col=dc[i%dc.length]; donutHTML+=`<circle cx="95" cy="95" r="76" fill="none" stroke="${col}" stroke-width="22" stroke-dasharray="${da.toFixed(2)} ${(circ-da).toFixed(2)}" stroke-dashoffset="${(-cum).toFixed(2)}" transform="rotate(-90 95 95)" style="cursor:pointer" onmouseover="_showTip(event,'<strong>${s.name}</strong><br>${Math.round(pct*100)}% of XP')" onmouseout="_hideTip()"/>`; cum+=da; });
  donutHTML+=`<text x="95" y="90" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Cinzel,serif">${Math.round(totalXPCat).toLocaleString()}</text><text x="95" y="108" text-anchor="middle" fill="rgba(222,209,198,0.5)" font-size="10" font-family="Inter,sans-serif">Total XP</text></svg>`;
  let donutLegend='<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center">';
  skills.forEach((s,i)=>{ const pct=totalXPCat>0?Math.round((skillXP[s.key]||0)/totalXPCat*100):0; if(!pct) return; donutLegend+=`<span style="font-size:9px;color:var(--dim);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${dc[i%dc.length]};display:inline-block"></span>${s.name} ${pct}%</span>`; });
  donutLegend+='</div>';

  document.getElementById('analytics-grid').innerHTML=`
    <div class="analytics-card"><h4>📊 XP Contribution</h4>${contribHTML}</div>
    <div class="analytics-card"><h4>🎯 Daily Achievement (30d avg)</h4>${achieveHTML}</div>
    <div class="analytics-card" style="grid-column:1/-1"><h4>📈 XP Trend</h4><div class="line-chart-container hidden-scroll">${lineSVG}</div></div>
    <div class="analytics-card"><h4>🍩 XP Distribution</h4>${donutHTML}${donutLegend}</div>`;
}
</script>

<!-- ══════════════════════════════════════════════
     ⑪ CONTROL PAGE
══════════════════════════════════════════════ -->
<script>
function renderControl(){
  let html=`
    <div class="card" style="margin-bottom:18px">
      <h3 style="font-family:var(--f-title);color:var(--beige);margin-bottom:4px">➕ Add Category</h3>
      <div style="font-size:11px;color:var(--dim);margin-bottom:12px">Categories group your skills (e.g. Language, Sports, Spiritual)</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="ctrl-cat-name" class="control-input" placeholder="Category name" style="flex:1;min-width:140px">
        <input id="ctrl-cat-icon" class="control-input" placeholder="Emoji" maxlength="2" style="width:72px">
        <input type="color" id="ctrl-cat-color" value="#A77693" style="width:46px;height:38px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer">
        <button class="btn-primary" onclick="uiAddCategory()">Add Category</button>
      </div>
    </div>`;

  const cats=Object.values(CATEGORIES);
  if(!cats.length) html+=`<div style="text-align:center;padding:40px;color:var(--dim);border:1px dashed var(--border);border-radius:var(--radius-card)"><div style="font-size:14px;margin-bottom:6px">No categories yet</div><div style="font-size:12px">Add your first category above</div></div>`;

  cats.forEach(cat=>{
    const catSkills=SKILLS.filter(s=>s.cat===cat.id);
    html+=`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-family:var(--f-title);color:${cat.color}">${cat.icon} ${cat.name}</h3>
        <button class="btn-danger" onclick="uiDeleteCategory('${cat.id}')">🗑️ Delete</button>
      </div>`;
    if(!catSkills.length) html+=`<div style="font-size:11px;color:var(--very-dim);margin-bottom:10px;padding:8px;border:1px dashed var(--border);border-radius:7px;text-align:center">No skills yet</div>`;
    catSkills.forEach(skill=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:7px;margin-bottom:5px;flex-wrap:wrap">
        <span style="flex:1;min-width:110px;font-size:12px">${skillSVG(skill.key,13)} ${skill.name}</span>
        <label style="font-size:9px;color:var(--dim)">Goal</label>
        <input type="number" value="${skill.goal}" min="1" style="width:65px" class="control-input" onchange="dbUpdateSkill('${skill.key}','goal',Math.max(1,parseInt(this.value)||${skill.goal}))">
        <span style="font-size:9px;color:var(--dim)">${skill.unit}</span>
        <label style="font-size:9px;color:var(--dim)">XP/unit</label>
        <input type="number" value="${skill.xpW||1}" min="1" style="width:55px" class="control-input" onchange="dbUpdateSkill('${skill.key}','xpW',Math.max(1,parseInt(this.value)||${skill.xpW||1}))">
        <button class="btn-danger" style="padding:4px 8px" onclick="uiDeleteSkill('${skill.key}')">🗑️</button>
      </div>`;
    });
    html+=`<div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">
      <input id="ctrl-skill-name-${cat.id}" class="control-input" placeholder="Skill name" style="flex:1;min-width:120px">
      <input id="ctrl-skill-goal-${cat.id}" type="number" class="control-input" placeholder="Daily goal" style="width:80px">
      <input id="ctrl-skill-unit-${cat.id}" class="control-input" placeholder="Unit" style="width:76px">
      <input id="ctrl-skill-xpw-${cat.id}" type="number" class="control-input" placeholder="XP/u" value="1" style="width:58px">
      <button class="btn-primary" onclick="uiAddSkill('${cat.id}')">+ Add Skill</button>
    </div></div>`;
  });
  document.getElementById('control-content').innerHTML=html;
}

async function uiAddCategory(){
  const name=document.getElementById('ctrl-cat-name')?.value.trim();
  const icon=document.getElementById('ctrl-cat-icon')?.value.trim()||'📌';
  const color=document.getElementById('ctrl-cat-color')?.value||'#A77693';
  if(!name) return alert('Enter a category name');
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(CATEGORIES[id]) return alert('A category with this ID already exists');
  await dbAddCategory({id,name,icon,color});
  renderControl();
}

async function uiDeleteCategory(catId){
  if(!confirm(`Delete category "${CATEGORIES[catId]?.name}" and ALL its skills & entries?`)) return;
  await dbDeleteCategory(catId);
  renderControl();
}

async function uiAddSkill(catId){
  const name=document.getElementById(`ctrl-skill-name-${catId}`)?.value.trim();
  const goal=parseInt(document.getElementById(`ctrl-skill-goal-${catId}`)?.value)||10;
  const unit=document.getElementById(`ctrl-skill-unit-${catId}`)?.value.trim()||'units';
  const xpW=parseInt(document.getElementById(`ctrl-skill-xpw-${catId}`)?.value)||1;
  if(!name) return alert('Enter a skill name');
  const key=catId+'_'+name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(SKILLS.find(s=>s.key===key)) return alert('Skill already exists');
  await dbAddSkill({key,cat:catId,name,goal,unit,xpW});
  renderControl();
}

async function uiDeleteSkill(skillKey){
  if(!confirm('Delete this skill and all its entries?')) return;
  await dbDeleteSkill(skillKey);
  renderControl();
}
</script>

<!-- ══════════════════════════════════════════════
     ⑫ INIT — runs when page loads
══════════════════════════════════════════════ -->
<script>
document.addEventListener('DOMContentLoaded', async ()=>{

  /* Set today's date in log */
  const inp=document.getElementById('log-date');
  if(inp) inp.value=getTodayStr();

  /* Try to connect to Supabase */
  if(SUPABASE_URL !== 'YOUR_PROJECT_URL' && window.supabase){
    document.getElementById('loading-sub').textContent='Connecting to database…';
    try{
      _sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      document.getElementById('loading-sub').textContent='Loading your data…';
      await fetchAllFromSupabase();
    } catch(err){
      console.error('Init error:',err);
      _loadFromLocalStorage();
      setSyncStatus('error','⚠ offline');
    }
  } else {
    /* No Supabase configured — run in offline/localStorage mode */
    document.getElementById('loading-sub').textContent='Running in offline mode…';
    _loadFromLocalStorage();
    setSyncStatus('error','⚠ offline mode');
  }

  /* Hide loading overlay and show app */
  const overlay=document.getElementById('loading-overlay');
  overlay.classList.add('done');
  setTimeout(()=>{ overlay.style.display='none'; },450);

  renderLog();
});
</script>
</body>
</html>
